skills:
  auto-load: true
  paths:
    - .trae/skills
  open-source:
    os-ui-library:
      active: native
      implementations:
        - name: native
          description: 自研轻量级实现
          enabled: true
        - name: antd
          description: 基于 Ant Design
          enabled: false
          dependencies:
            - "antd"
            - "@ant-design/icons"
        - name: material
          description: 基于 Material UI
          enabled: false
          dependencies:
            - "@mui/material"
            - "@emotion/react"
            - "@emotion/styled"
    os-chat-model:
      active: deepseek
      implementations:
        - name: openai
          description: OpenAI API
          enabled: false
          env:
            - OPENAI_API_KEY
            - OPENAI_BASE_URL
        - name: deepseek
          description: DeepSeek API
          enabled: true
          env:
            - DEEPSEEK_API_KEY
            - DEEPSEEK_BASE_URL
        - name: claude
          description: Claude API
          enabled: false
          env:
            - CLAUDE_API_KEY