server:
  port: 8080

spring:
  application:
    name: best-practice-dev-flow-backend

  datasource:
    url: jdbc:h2:mem:devflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.bage.study.ai.best.practice.dev.flow: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: bage-study-ai-best-practice-dev-flow-jwt-secret-key-2024
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: always