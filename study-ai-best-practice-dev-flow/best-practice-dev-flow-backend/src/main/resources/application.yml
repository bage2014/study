server:
  port: 8080

spring:
  application:
    name: best-practice-dev-flow-backend

  datasource:
    url: jdbc:h2:mem:devflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.bage.study.ai.best.practice.dev.flow: DEBUG
    org.hibernate.SQL: DEBUG