# Server Configuration
server.port=8080
spring.application.name=family-tree-backend

# Database Configuration (PostgreSQL for production)
spring.datasource.url=jdbc:postgresql://localhost:5432/family_tree
spring.datasource.username=familytree
spring.datasource.password=familytree123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin

# JWT Configuration
jwt.secret=${JWT_SECRET:familytreeappsecretkey}
jwt.expiration=86400000

# Logging
logging.level.root=info
logging.level.com.familytree=info

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Metrics Configuration
management.metrics.export.prometheus.enabled=true