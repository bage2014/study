# Server Configuration
server.port=8080
spring.application.name=family-tree-backend

# Database Configuration (MySQL for production)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:family_tree}?useSSL=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:familytree}
spring.datasource.password=${DB_PASSWORD:familytree123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin

# JWT Configuration
# IMPORTANT: Must set JWT_SECRET environment variable in production (at least 32 characters)
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyInProductionEnvironment123456}
jwt.expiration=86400000

# Logging
logging.level.root=info
logging.level.com.familytree=info

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Metrics Configuration
management.metrics.export.prometheus.enabled=true
