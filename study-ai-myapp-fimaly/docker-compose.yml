version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: familytree-postgres
    environment:
      POSTGRES_DB: family_tree
      POSTGRES_USER: familytree
      POSTGRES_PASSWORD: familytree123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    build:
      context: ./backend
    container_name: familytree-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: familytreeappsecretkey
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/family_tree
      SPRING_DATASOURCE_USERNAME: familytree
      SPRING_DATASOURCE_PASSWORD: familytree123
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: ./frontend/web
    container_name: familytree-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres-data:
    driver: local