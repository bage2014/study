server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:grayflow
    driver-class-name: org.h2.Driver
    username: sa
    password: "123"
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  replay:
    base-url: ""
    header-name: X-Replay-Request