spring:
  application:
    name: study-ai-app-compares-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pricecompare}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 16
          max-wait: 1000ms
          max-idle: 8
          min-idle: 4

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.bage.study.ai: INFO
    org.hibernate.SQL: WARN

platform:
  taobao:
    enabled: ${TAOBAO_ENABLED:false}
    app-key: ${TAOBAO_APP_KEY:}
    app-secret: ${TAOBAO_APP_SECRET:}
    base-url: https://eco.taobao.com/router/rest
    api-version: 2.0
  jd:
    enabled: ${JD_ENABLED:false}
    app-key: ${JD_APP_KEY:}
    app-secret: ${JD_APP_SECRET:}
    access-token: ${JD_ACCESS_TOKEN:}
    base-url: https://api.jd.com/routerjson
  meituan:
    enabled: ${MEITUAN_ENABLED:false}
    app-key: ${MEITUAN_APP_KEY:}
    app-secret: ${MEITUAN_APP_SECRET:}
    base-url: https://api.meituan.com
