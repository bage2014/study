spring:
  application:
    name: study-ai-app-compares-backend

  datasource:
    url: jdbc:h2:mem:pricecompare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

server:
  port: 8080

logging:
  level:
    com.bage.study.ai: DEBUG
    org.hibernate.SQL: DEBUG

platform:
  taobao:
    enabled: false
    app-key: ${TAOBAO_APP_KEY:}
    app-secret: ${TAOBAO_APP_SECRET:}
    base-url: https://eco.taobao.com/router/rest
    api-version: 2.0
  jd:
    enabled: false
    app-key: ${JD_APP_KEY:}
    app-secret: ${JD_APP_SECRET:}
    access-token: ${JD_ACCESS_TOKEN:}
    base-url: https://api.jd.com/routerjson
  meituan:
    enabled: false
    app-key: ${MEITUAN_APP_KEY:}
    app-secret: ${MEITUAN_APP_SECRET:}
    base-url: https://api.meituan.com

rpa:
  enabled: ${RPA_ENABLED:true}
  headless: ${RPA_HEADLESS:true}
  timeout: ${RPA_TIMEOUT:30000}
  page-load-timeout: ${RPA_PAGE_LOAD_TIMEOUT:60000}
