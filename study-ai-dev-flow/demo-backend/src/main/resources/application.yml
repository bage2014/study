server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:demo_db
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

http:
  logging:
    exclude-paths:
      - /actuator
      - /health
      - /favicon.ico